applications:
  learning_logs:
    type: python:3.13
    source:
      root: "./"
    entrypoint: learning_logs.wsgi:application
    web:
      commands:
        start: "gunicorn --pythonpath=. -b unix:$SOCKET learning_logs.wsgi --log-file -"
      upstream:
        socket_family: unix
      locations:
        "/":
          passthru: true
        "/static":
          allow: true
          expires: "1h"
          root: "static"
    hooks:
      build: |
        set -eux
        python Llogs/manage.py collectstatic --noinput
      deploy: |
        set -eux
        python Llogs/manage.py migrate

services:
  postgresql:
    type: postgresql:18

routes:
  "/":
    type: wsgi
    application: learning_logs

redirects:
  "www":
    to: "/"